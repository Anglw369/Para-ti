<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Un Detalle Especial</title>
    <style>
        /* Estilos generales y fondo */
        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #ffe4e1 0%, #ffcbd5 100%);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: #333;
            overflow: hidden;
        }

        /* Contenedor de la tarjeta */
        .card {
            background-color: rgba(255, 255, 255, 0.85);
            padding: 40px 30px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
            text-align: center;
            max-width: 350px;
            width: 85%;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.5);
            transition: transform 0.3s ease;
        }

        .card:hover {
            transform: translateY(-5px);
        }

        /* Animación del corazón */
        .heart {
            font-size: 4rem;
            color: #ff4d6d;
            margin-bottom: 15px;
            display: inline-block;
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.15); }
            100% { transform: scale(1); }
        }

        h1 {
            font-size: 1.8rem;
            margin-bottom: 10px;
            color: #ff4d6d;
        }

        p {
            font-size: 1rem;
            line-height: 1.5;
            color: #555;
            margin-bottom: 25px;
            transition: opacity 0.4s ease;
        }

        /* Botón interactivo */
        button {
            background-color: #ff4d6d;
            color: white;
            border: none;
            padding: 12px 25px;
            font-size: 1rem;
            border-radius: 25px;
            cursor: pointer;
            box-shadow: 0 5px 15px rgba(255, 77, 109, 0.3);
            transition: background 0.3s ease, transform 0.2s ease;
        }

        button:hover {
            background-color: #ff758f;
            transform: scale(1.05);
        }

        button:active {
            transform: scale(0.98);
        }
    </style>
</head>
<body>

    <div class="card">
        <div class="heart">❤️</div>
        <h1 id="title">¡Hola!</h1>
        <p id="message">Creé esta página especialmente para probar que el enlace funcione correctamente. Da clic abajo.</p>
        <button onclick="changeMessage()">Pícame aquí</button>
    </div>

    <script>
        // Lógica interactiva sencilla
        function changeMessage() {
            const messageEl = document.getElementById('message');
            const titleEl = document.getElementById('title');
            
            titleEl.textContent = "¡Funciona! ✨";
            messageEl.textContent = "El link está activo y conectado a tu Visual Studio Code. ¡Ya podemos empezar a meterle el diseño final y las sorpresas que quieras!";
            messageEl.style.opacity = 1;
        }
    </script>
</body>
</html>
